    <script>
    'use strict';
    const commutesEl = { map: document.querySelector('.map-view'), initialStatePanel: document.querySelector('.commutes-initial-state'), destinationPanel: document.querySelector('.commutes-destinations'), modal: document.querySelector('.commutes-modal-container') };
    const destinationPanelEl = { addButton: commutesEl.destinationPanel.querySelector('.add-button'), container: commutesEl.destinationPanel.querySelector('.destinations-container'), list: commutesEl.destinationPanel.querySelector('.destination-list'), scrollLeftButton: commutesEl.destinationPanel.querySelector('.left-control'), scrollRightButton: commutesEl.destinationPanel.querySelector('.right-control'), getActiveDestination: () => commutesEl.destinationPanel.querySelector('.destination.active') };
    const destinationModalEl = { title: commutesEl.modal.querySelector('h2'), form: commutesEl.modal.querySelector('form'), destinationInput: commutesEl.modal.querySelector('input[name="destination-address"]'), errorMessage: commutesEl.modal.querySelector('.error-message'), addButton: commutesEl.modal.querySelector('.add-destination-button'), deleteButton: commutesEl.modal.querySelector('.delete-destination-button'), editButton: commutesEl.modal.querySelector('.edit-destination-button'), cancelButton: commutesEl.modal.querySelector('.cancel-button'), getTravelModeInput: () => commutesEl.modal.querySelector('input[name="travel-mode"]:checked') };
    const MAX_NUM_DESTINATIONS = 10;
    const BIAS_BOUND_DISTANCE = 0.5;
    const HOUR_IN_SECONDS = 3600;
    const MIN_IN_SECONDS = 60;
    const STROKE_COLORS = { active: { innerStroke: '#4285F4', outerStroke: '#185ABC' }, inactive: { innerStroke: '#BDC1C6', outerStroke: '#80868B' } };
    const MARKER_ICON_COLORS = { active: { fill: '#EA4335', stroke: '#C5221F', label: '#FFF' }, inactive: { fill: '#F1F3F4', stroke: '#9AA0A6', label: '#3C4043' } };
    const DestinationOperation = { ADD: 'ADD', EDIT: 'EDIT', DELETE: 'DELETE' };
    const TravelMode = { DRIVING: 'DRIVING', TRANSIT: 'TRANSIT', BICYCLING: 'BICYCLING', WALKING: 'WALKING' };

    function Commutes(configuration) {
      let commutesMap, activeDestinationIndex, origin = configuration.mapOptions.center, destinations = configuration.destination || [], markerIndex = 0, lastActiveEl;
      const markerIconConfig = { path: 'M10 27c-.2 0-.2 0-.5-1-.3-.8-.7-2-1.6-3.5-1-1.5-2-2.7-3-3.8-2.2-2.8-3.9-5-3.9-8.8C1 4.9 5 1 10 1s9 4 9 8.9c0 3.9-1.8 6-4 8.8-1 1.2-1.9 2.4-2.8 3.8-1 1.5-1.4 2.7-1.6 3.5-.3 1-.4 1-.6 1Z', fillOpacity: 1, strokeWeight: 1, anchor: new google.maps.Point(15, 29), scale: 1.2, labelOrigin: new google.maps.Point(10, 9) };
      const originMarkerIcon = { ...markerIconConfig, fillColor: MARKER_ICON_COLORS.active.fill, strokeColor: MARKER_ICON_COLORS.active.stroke };
      const destinationMarkerIcon = { ...markerIconConfig, fillColor: MARKER_ICON_COLORS.inactive.fill, strokeColor: MARKER_ICON_COLORS.inactive.stroke };
      const bikeLayer = new google.maps.BicyclingLayer(), publicTransitLayer = new google.maps.TransitLayer();

      initMapView(); initDestinations(); initCommutesPanel(); initCommutesModal();

      function initMapView() {
        commutesMap = new google.maps.Map(commutesEl.map, configuration.mapOptions);
        configuration.defaultTravelModeEnum = parseTravelModeEnum(configuration.defaultTravelMode);
        setTravelModeLayer(configuration.defaultTravelModeEnum);
        createMarker(origin);
      }

      function initDestinations() {
        if (!configuration.initialDestinations) return;
        let callbackCounter = 0;
        const placesService = new google.maps.places.PlacesService(commutesMap);
        for (const destination of configuration.initialDestinations) {
          destination.travelModeEnum = parseTravelModeEnum(destination.travelMode);
          const label = getNextMarkerLabel();
          placesService.getDetails({ placeId: destination.placeId, fields: ['place_id', 'geometry', 'name'] }, (place) => {
            if (!place.geometry || !place.geometry.location) return;
            const destinationConfig = createDestinationConfig(place, destination.travelModeEnum || configuration.defaultTravelModeEnum, label);
            getDirections(destinationConfig).then((response) => {
              if (!response) return;
              destinations.push(destinationConfig); getCommutesInfo(response, destinationConfig);
              callbackCounter++;
              if (callbackCounter === configuration.initialDestinations.length) {
                destinations.sort((a, b) => a.label < b.label ? -1 : 1);
                let bounds = new google.maps.LatLngBounds();
                for (let i = 0; i < destinations.length; i++) {
                  assignMapObjectListeners(destinations[i], i);
                  updateCommutesPanel(destinations[i], i, DestinationOperation.ADD);
                  bounds.union(destinations[i].bounds);
                }
                handleRouteClick(destinations[destinations.length - 1], destinations.length - 1);
                commutesMap.fitBounds(bounds);
              }
            });
          });
        }
      }

      function initCommutesPanel() {
        document.querySelectorAll('.add-button').forEach(btn => btn.addEventListener('click', () => {
          destinationModalEl.title.innerHTML = 'Add destination'; hideElement(destinationModalEl.deleteButton); hideElement(destinationModalEl.editButton); showElement(destinationModalEl.addButton); showModal();
          document.forms['destination-form'][(configuration.defaultTravelModeEnum || TravelMode.DRIVING).toLowerCase() + '-mode'].checked = true;
        }));
        destinationPanelEl.scrollLeftButton.addEventListener('click', handleScrollButtonClick);
        destinationPanelEl.scrollRightButton.addEventListener('click', handleScrollButtonClick);
      }

      function initCommutesModal() {
        const boundConfig = { north: origin.lat + BIAS_BOUND_DISTANCE, south: origin.lat - BIAS_BOUND_DISTANCE, east: origin.lng + BIAS_BOUND_DISTANCE, west: origin.lng - BIAS_BOUND_DISTANCE };
        const destinationFormReset = () => { destinationModalEl.destinationInput.classList.remove('error'); destinationModalEl.errorMessage.innerHTML = ''; destinationModalEl.form.reset(); };
        const autocomplete = new google.maps.places.Autocomplete(destinationModalEl.destinationInput, { bounds: boundConfig, fields: ['place_id', 'geometry', 'name'] });
        let destinationToAdd;
        autocomplete.addListener('place_changed', () => {
           const place = autocomplete.getPlace();
           if (place.geometry && place.geometry.location) { destinationToAdd = place; destinationModalEl.getTravelModeInput().focus(); }
           destinationModalEl.destinationInput.classList.remove('error'); destinationModalEl.errorMessage.innerHTML = '';
        });
        destinationModalEl.addButton.addEventListener('click', () => {
          if (!validateDestinationInput(destinationToAdd)) return;
          addDestinationToList(destinationToAdd, destinationModalEl.getTravelModeInput().value);
          destinationFormReset(); hideModal();
        });
        destinationModalEl.editButton.addEventListener('click', () => {
          const destination = {...destinations[activeDestinationIndex]};
          const selectedTravelMode = destinationModalEl.getTravelModeInput().value;
          if (destination.name === destinationModalEl.destinationInput.value && destination.travelModeEnum === selectedTravelMode) { hideModal(); return; }
          if (destination.name !== destinationModalEl.destinationInput.value) {
            if (!validateDestinationInput(destinationToAdd)) return;
            destination.name = destinationToAdd.name; destination.place_id = destinationToAdd.place_id;
          }
          destination.travelModeEnum = selectedTravelMode;
          destination.url = generateMapsUrl(destination, selectedTravelMode);
          destinationFormReset();
          getDirections(destination).then((response) => {
            if (!response) return;
            removeDirectionsFromMapView(destinations[activeDestinationIndex]);
            destinations[activeDestinationIndex] = destination;
            getCommutesInfo(response, destination); assignMapObjectListeners(destination, activeDestinationIndex);
            updateCommutesPanel(destination, activeDestinationIndex, DestinationOperation.EDIT);
            handleRouteClick(destination, activeDestinationIndex);
          });
          hideModal();
        });
        destinationModalEl.cancelButton.addEventListener('click', () => { destinationFormReset(); hideModal(); });
        destinationModalEl.deleteButton.addEventListener('click', () => {
          removeDirectionsFromMapView(destinations[activeDestinationIndex]);
          updateCommutesPanel(destinations[activeDestinationIndex], activeDestinationIndex, DestinationOperation.DELETE);
          activeDestinationIndex = undefined; destinationFormReset();
          if (destinations.length) handleRouteClick(destinations[destinations.length - 1], destinations.length -1);
          hideModal();
        });
      }

      function validateDestinationInput(destinationToAdd) {
        let err; if (!destinationToAdd) err = 'No details available'; else if (destinations.length >= MAX_NUM_DESTINATIONS) err = 'Max destinations reached'; else if (destinations.find(d => d.place_id === destinationToAdd.place_id)) err = 'Already added';
        if (err) { destinationModalEl.errorMessage.innerHTML = err; destinationModalEl.destinationInput.classList.add('error'); return false; }
        return true;
      }

      function removeDirectionsFromMapView(destination) { destination.polylines.innerStroke.setMap(null); destination.polylines.outerStroke.setMap(null); destination.marker.setMap(null); }

      function buildDestinationCardTemplate(destination, idx, op) {
        let editBtn;
        if (op === DestinationOperation.ADD) {
          destinationPanelEl.list.insertAdjacentHTML('beforeend', '<div class="destination-container">' + generateDestinationTemplate(destination) + '</div>');
          const el = destinationPanelEl.list.lastElementChild; el.addEventListener('click', () => handleRouteClick(destination, idx));
          editBtn = el.querySelector('.edit-button');
        } else if (op === DestinationOperation.EDIT) {
          const el = destinationPanelEl.getActiveDestination().parentElement; el.innerHTML = generateDestinationTemplate(destination);
          el.addEventListener('click', () => handleRouteClick(destination, idx));
          editBtn = el.querySelector('.edit-button');
        }
        editBtn.addEventListener('click', (e) => {
          e.stopPropagation();
          destinationModalEl.title.innerHTML = 'Edit destination'; destinationModalEl.destinationInput.value = destination.name;
          showElement(destinationModalEl.deleteButton); showElement(destinationModalEl.editButton); hideElement(destinationModalEl.addButton); showModal();
          document.forms['destination-form'][destination.travelModeEnum.toLowerCase() + '-mode'].checked = true;
        });
      }

      function updateCommutesPanel(destination, idx, op) {
        if (op === DestinationOperation.ADD) { hideElement(commutesEl.initialStatePanel); showElement(commutesEl.destinationPanel); }
        if (op === DestinationOperation.DELETE) {
          destinations.splice(idx, 1); destinationPanelEl.list.innerHTML = '';
          destinations.forEach((d, i) => { buildDestinationCardTemplate(d, i, DestinationOperation.ADD); assignMapObjectListeners(d, i); });
        } else { buildDestinationCardTemplate(destination, idx, op); }
        if (!destinations.length) { showElement(commutesEl.initialStatePanel); hideElement(commutesEl.destinationPanel); activeDestinationIndex = undefined; return; }
        handlePanelScroll();
      }

      function addDestinationToList(place, mode) {
        const config = createDestinationConfig(place, mode);
        getDirections(config).then(res => {
          if (!res) return; destinations.push(config); getCommutesInfo(res, config); assignMapObjectListeners(config, destinations.length - 1);
          updateCommutesPanel(config, destinations.length - 1, DestinationOperation.ADD); handleRouteClick(config, destinations.length - 1);
        });
      }

      function getNextMarkerLabel() { const labels = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ'; return labels[markerIndex++ % labels.length]; }
      function createDestinationConfig(place, mode, label) { return { name: place.name, place_id: place.place_id, label: label || getNextMarkerLabel(), travelModeEnum: mode, url: generateMapsUrl(place, mode) }; }
      function getDirections(dest) {
        return new google.maps.DirectionsService().route({
          origin: origin, destination: { placeId: dest.place_id }, travelMode: dest.travelModeEnum, unitSystem: google.maps.UnitSystem.METRIC
        });
      }

      function getCommutesInfo(res, dest) {
        const path = res.routes[0].overview_path, leg = res.routes[0].legs[0];
        dest.distance = leg.distance.text; dest.duration = convertDurationValueAsString(leg.duration.value);
        dest.polylines = {
          innerStroke: new google.maps.Polyline({ path, strokeColor: STROKE_COLORS.inactive.innerStroke, strokeOpacity: 1, strokeWeight: 3, zIndex: 10, map: commutesMap }),
          outerStroke: new google.maps.Polyline({ path, strokeColor: STROKE_COLORS.inactive.outerStroke, strokeOpacity: 1, strokeWeight: 6, zIndex: 1, map: commutesMap })
        };
        dest.marker = createMarker(leg.end_location, dest.label); dest.bounds = res.routes[0].bounds;
      }

      function assignMapObjectListeners(dest, idx) {
        google.maps.event.addListener(dest.marker, 'click', () => handleRouteClick(dest, idx));
        [dest.polylines.innerStroke, dest.polylines.outerStroke].forEach(p => google.maps.event.addListener(p, 'click', () => handleRouteClick(dest, idx)));
      }

      function generateMapsUrl(place, mode) { return `https://www.google.com/maps/dir/?api=1&origin=${origin.lat},${origin.lng}&destination=${encodeURIComponent(place.name)}&destination_place_id=${place.place_id}&travelmode=${mode.toLowerCase()}`; }

      function handleRouteClick(dest, idx) {
        if (activeDestinationIndex !== undefined) {
          const d = destinations[activeDestinationIndex];
          d.polylines.innerStroke.setOptions({ strokeColor: STROKE_COLORS.inactive.innerStroke });
          d.polylines.outerStroke.setOptions({ strokeColor: STROKE_COLORS.inactive.outerStroke });
          d.marker.setIcon(destinationMarkerIcon);
          const activeEl = destinationPanelEl.getActiveDestination(); if (activeEl) activeEl.classList.remove('active');
        }
        activeDestinationIndex = idx;
        setTravelModeLayer(dest.travelModeEnum);
        const el = destinationPanelEl.list.querySelectorAll('.destination')[idx]; el.classList.add('active'); el.scrollIntoView({ behavior: 'smooth', block: 'center' });
        dest.polylines.innerStroke.setOptions({ strokeColor: STROKE_COLORS.active.innerStroke, zIndex: 101 });
        dest.polylines.outerStroke.setOptions({ strokeColor: STROKE_COLORS.active.outerStroke, zIndex: 99 });
        dest.marker.setIcon(originMarkerIcon); commutesMap.fitBounds(dest.bounds);
      }

      function createMarker(loc, label) {
        const isOrigin = label === undefined;
        return new google.maps.Marker({
          position: loc, map: commutesMap,
          label: { text: isOrigin ? '●' : label, color: isOrigin ? '#FFF' : '#3C4043', fontSize: isOrigin ? '20px' : '16px' },
          icon: isOrigin ? originMarkerIcon : destinationMarkerIcon
        });
      }

      function parseTravelModeEnum(s) {
        switch (s) { case 'DRIVING': return TravelMode.DRIVING; case 'BICYCLING': return TravelMode.BICYCLING; case 'PUBLIC_TRANSIT': return TravelMode.TRANSIT; case 'WALKING': return TravelMode.WALKING; default: return TravelMode.DRIVING; }
      }

      function setTravelModeLayer(mode) {
        bikeLayer.setMap(mode === TravelMode.BICYCLING ? commutesMap : null);
        publicTransitLayer.setMap(mode === TravelMode.TRANSIT ? commutesMap : null);
      }

      function convertDurationValueAsString(v) {
        if (v < 60) return '<1 min'; if (v > 36000) return '10+ hours';
        const h = Math.floor(v / 3600), m = Math.floor(v % 3600 / 60);
        return (h > 0 ? h + ' h ' : '') + (m > 0 ? m + ' min' : '');
      }

      function showModal() { lastActiveEl = document.activeElement; showElement(commutesEl.modal, destinationModalEl.destinationInput); }
      function hideModal() { hideElement(commutesEl.modal, lastActiveEl); }
    }

    function hideElement(el, focusEl) { el.style.display = 'none'; if (focusEl) focusEl.focus(); }
    function showElement(el, focusEl) { el.style.display = 'flex'; if (focusEl) focusEl.focus(); }
    function handleScrollButtonClick(e) {
      const dir = e.currentTarget.dataset.direction;
      destinationPanelEl.container.scrollBy({ left: dir * 200, behavior: 'smooth' });
    }
    function handlePanelScroll() {
      const p = destinationPanelEl.container.scrollLeft, sw = destinationPanelEl.container.scrollWidth, w = destinationPanelEl.container.offsetWidth;
      destinationPanelEl.scrollLeftButton.style.display = p > 0 ? 'block' : 'none';
      destinationPanelEl.scrollRightButton.style.display = p + w < sw ? 'block' : 'none';
    }
    function generateDestinationTemplate(d) {
      return `<div class="destination" tabindex="0" role="button">
          <div class="destination-content">
            <div class="metadata"> ${d.distance} <span class="location-marker">${d.label}</span></div>
            <div class="address">To <abbr title="${d.name}">${d.name}</abbr></div>
            <div class="destination-eta">${d.duration}</div>
          </div>
        </div>
        <div class="destination-controls">
          <a class="directions-button" href="${d.url}" target="_blank">GO</a>
          <button class="edit-button">Edit</button>
        </div>`;
    }

    const CONFIGURATION = {
      defaultTravelMode: "DRIVING",
      mapOptions: { center: { lat: -3.7185094, lng: 102.2535869 }, zoom: 14, mapId: "" },
      mapsApiKey: "AIzaSyBSRav1N-ym3oPs-2tBc4hp9oofJ12d3g8"
    };
    function initMap() { new Commutes(CONFIGURATION); }
    </script>
    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyBSRav1N-ym3oPs-2tBc4hp9oofJ12d3g8&callback=initMap&libraries=places,geometry" async defer></script>
  </body>
</html>
